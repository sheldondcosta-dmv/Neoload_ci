name: Neoload Test Execution
 
on:
  workflow_dispatch:
 
jobs:
  run-neoload-test:
    runs-on: neoload-runner-2
 
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Verify NeoLoad CLI
        run: |
          neoload --version
 
      - name: Login to NeoLoad
        env:
          NL_APIKEY: ${{ secrets.NEOLOAD_TOKEN }}
        run: |
          neoload login \
            --url https://neoload-api.saas.neotys.com \
            --apikey $NL_APIKEY
 
      - name: Execute NeoLoad Scenario
        run: |
          neoload run \
            --project-path "./petstore.nlp" \
            --scenario "scenario1" \
            --result-name "GitHub Run $GITHUB_RUN_ID"
