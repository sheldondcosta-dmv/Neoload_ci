name: Neoload Test Execution
 
on:
  workflow_dispatch:
 
jobs:
  run-neoload-test:
    runs-on: neoload-runner-2
 
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Verify NeoLoad CLI
        run: |
          neoload --version
 
   
 
      - name: Execute NeoLoad Scenario
        run: |
          neoload run \
            --project-path "./petstore.nlp" \
            --scenario "scenario1" \
            --result-name "GitHub Run $GITHUB_RUN_ID"
