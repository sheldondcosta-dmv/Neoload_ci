name: Neoload Test Execution
on:
  workflow_dispatch: # Allows manual trigger
jobs:
  run-neoload-test:
    runs-on: neoload-runner-2 # Matches dxpvr-perfTest runner
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Execute NeoLoad Scenario
        shell: powershell
        run: |
          $projectPath = "$($env:GITHUB_WORKSPACE)\petstore.nlp"
          & "C:\Program Files\NeoLoad 2024.3\bin\NeoLoadCmd.exe" -project $projectPath -launch "scenario1" -noGUI
