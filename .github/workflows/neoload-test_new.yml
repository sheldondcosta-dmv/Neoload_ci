name: Neoload Test Execution
on:
  workflow_dispatch: # Allows manual trigger
jobs:
  run-neoload-test:
    runs-on: neoload # Matches dxpvr-perfTest runner
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Execute NeoLoad Scenario
        shell: powershell
        run: |
          $neoloadPath = 'C:\Program Files\NeoLoad 2024.3\bin\NeoLoadCmd.exe'
          $projectPath = "$($env:GITHUB_WORKSPACE)\petstore.nlp"
          $reportPath = "$($env:GITHUB_WORKSPACE)\neoload-report.html"
          & $neoloadPath -project $projectPath -launch "scenario1" -noGUI -report $reportPath
      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoLoad-HTML-Report
          path: ${{ github.workspace }}\neoload-report.html

