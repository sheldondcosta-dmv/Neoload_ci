name: Neoload Test Execution
on:
  workflow_dispatch:
jobs:
  run-neoload-test:
    runs-on: neoload-runner-2
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Login to NeoLoad
        env:
          NL_TOKEN: ${{ secrets.NEOLOAD_TOKEN }}
        run: |
          neoload login --token $NL_TOKEN
      - name: Execute NeoLoad Scenario
        run: |
          neoload run \
            --project-path "./petstore.nlp" \
            --scenario "scenario1" \
         

